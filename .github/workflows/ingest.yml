name: ingest

# Poll OpenDota /proMatches -> Supabase. Incremental (watermark). Juga keep-alive Supabase.
on:
  schedule:
    - cron: "0 * * * *" # tiap jam (§9.5: 30-60 menit)
  workflow_dispatch: {} # trigger manual buat test

concurrency:
  group: ingest
  cancel-in-progress: false # jangan tumpang-tindih run (watermark race)

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22" # native WebSocket (supabase-js realtime dep)
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}
          INGEST_MAX_MATCHES: "25"
