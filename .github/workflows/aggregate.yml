name: aggregate

# Rebuild tabel hitungan (tournament_hero_stats) dari picks_bans. TERPISAH dari ingest,
# jalan lebih jarang (harian) biar murah. Rebuildable — aman di-recompute penuh.
on:
  schedule:
    - cron: "30 4 * * *" # harian 04:30 UTC
  workflow_dispatch: {}

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run aggregate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
