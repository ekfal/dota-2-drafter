name: aggregate

# Rebuild tabel hitungan (tournament_hero_stats) dari picks_bans. RANTAI: jalan otomatis SETELAH
# stratz selesai (workflow_run) → aggregate pakai data terlengkap. Rebuildable — aman recompute.
on:
  workflow_run:
    workflows: ["stratz-lane"] # = name: stratz-lane (nama workflow stratz), bukan nama file.
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    # cuma lanjut kalau stratz SUKSES. Manual dispatch tetap jalan.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run aggregate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
