name: stratz-lane

# Backfill lane_result (STRATZ). RANTAI: jalan otomatis SETELAH ingest selesai (workflow_run),
# bukan jadwal timing → match baru langsung dapet lane. Butuh secret STRATZ_TOKEN.
on:
  workflow_run:
    workflows: ["ingest"] # = name: ingest. workflow_run cuma trigger dari default branch (main).
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: stratz
  cancel-in-progress: false

jobs:
  stratz:
    runs-on: ubuntu-latest
    # cuma lanjut kalau ingest SUKSES (jangan proses kalau ingest gagal). Manual dispatch tetap jalan.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run stratz
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STRATZ_TOKEN: ${{ secrets.STRATZ_TOKEN }}
