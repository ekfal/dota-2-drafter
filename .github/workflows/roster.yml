name: roster

# Roster kanonik STRATZ -> team_player_roles. Harian. roster.ts skip tim yang fresh (<7 hari) &
# fetch tim BARU (mis. tim EWC yang baru masuk) + tim stale otomatis. Butuh secret STRATZ_TOKEN.
on:
  schedule:
    - cron: "45 4 * * *" # HARIAN 04:45 UTC. Di luar rantai ingest→stratz→aggregate (beda cadence).
    # roster.ts TTL 3d → tim di-refresh tiap ~3 hari (nangkep transfer/standin), tim baru <1 hari.
  workflow_dispatch: {}

concurrency:
  group: roster
  cancel-in-progress: false

jobs:
  roster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run roster
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STRATZ_TOKEN: ${{ secrets.STRATZ_TOKEN }}
      # players.team_id + is_pro dari OpenDota /proPlayers (1 request bulk, cadence pro-data sama)
      - run: npm run pro-players
        if: always() # roster gagal (STRATZ down) jangan blok pro-players (sumber beda)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}
