name: roster

# Roster kanonik STRATZ -> team_player_roles. Harian. roster.ts skip tim yang fresh (<7 hari) &
# fetch tim BARU (mis. tim EWC yang baru masuk) + tim stale otomatis. Butuh secret STRATZ_TOKEN.
on:
  schedule:
    - cron: "45 4 * * 1" # MINGGUAN, Senin 04:45 UTC. roster.ts TTL 7d → tim di-refresh ~seminggu sekali.
    # Catatan: tim BARU (mis. entrant turnamen baru) baru dapet roster pas run mingguan berikutnya
    # (bisa telat sampai 7 hari). Kalau ada event & butuh cepat, trigger manual: Actions → roster → Run.
  workflow_dispatch: {}

concurrency:
  group: roster
  cancel-in-progress: false

jobs:
  roster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run roster
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STRATZ_TOKEN: ${{ secrets.STRATZ_TOKEN }}
